<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Objetos Perdidos</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f4f6f9;
      color: #0f172a;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0f4aa1, #2563eb);
      color: #fff;
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
    }

    header span {
      font-size: 14px;
      opacity: 0.9;
    }

    /* CONTENEDOR */
    .container {
      width: 95%;
      max-width: 1300px;
      margin: 25px auto;
    }

    /* TARJETA */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-header {
      padding: 18px 22px;
      border-bottom: 1px solid #e5e7eb;
    }

    .card-header h2 {
      margin: 0;
      font-size: 20px;
      color: #0f4aa1;
    }

    .card-header p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #64748b;
    }

    /* IFRAME */
    .iframe-container {
      width: 100%;
      height: 80vh;
    }

    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 12px;
      font-size: 13px;
      color: #64748b;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>COMBUSES S.A.</h1>
    <span>Sistema de Gestión Operativa</span>
  </header>

  <!-- CONTENIDO -->
  <div class="container">
    <div class="card">

      <div class="card-header">
        <h2>Registro de Objetos Perdidos</h2>
        <p>Formulario para registrar y gestionar objetos encontrados en la operación.</p>
      </div>

      <div class="iframe-container">
        <iframe 
          src="https://script.google.com/macros/s/AKfycbywkVzKnvMHatJUtBOXTq6zT4MPZ7_ZbH_N3o2SLbb2jc90Ux-TUo5yYYH4xlxFtT0ZDg/exec"
          allowfullscreen>
        </iframe>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 COMBUSES S.A. - Plataforma de Control Operativo
  </footer>

</body>
</html>
